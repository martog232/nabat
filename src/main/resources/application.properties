# Single runtime configuration
spring.application.name=nabat

# PostgreSQL
# Use 127.0.0.1 instead of localhost to avoid Windows IPv6 localhost conflicts.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/nabat_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:nabat_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:nabat_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Flyway handles schema and seed data
spring.sql.init.mode=never

# Server
server.port=${SERVER_PORT:8080}

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
# Mail is an optional outbound integration — exclude it from the liveness/readiness aggregate
# so that a missing SMTP relay (e.g. no MailHog locally) does not mark the app as DOWN.
# The mail health sub-indicator is still visible at /actuator/health when show-details=always.
management.health.mail.enabled=false

# Metrics — tag every meter with the application name for Prometheus grouping
management.metrics.tags.application=${spring.application.name}

# Tracing — sample 100 % in dev; reduce in production via environment variable
management.tracing.sampling.probability=${NABAT_TRACING_SAMPLING_PROBABILITY:1.0}

# JWT
# Local fallback is for development only so the app can start from IntelliJ without extra setup.
# Production/deployment MUST provide JWT_SECRET as an environment variable.
# Generate a real secret with: openssl rand -base64 48
jwt.secret=${JWT_SECRET:nabat-local-dev-jwt-secret-key-min-256-bits-for-local-development-only-123456}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Logging
logging.level.org.example.nabat=INFO
logging.level.org.hibernate.SQL=WARN

# Structured request/response logging. Set to true to enable per-request log lines.
logging.nabat.request-log=false

# CORS — comma-separated origins/patterns allowed for HTTP and WebSocket.
# Empty by default → no cross-origin requests permitted. Example for dev:
#   NABAT_CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
nabat.cors.allowed-origins=${NABAT_CORS_ALLOWED_ORIGINS:}

# WebSocket auth — browser clients should exchange their access token for a short-lived one-time ticket.
nabat.websocket.ticket-ttl=${NABAT_WEBSOCKET_TICKET_TTL:PT2M}

# Mail (SMTP) — points at MailHog in local dev, override in production
spring.mail.host=${MAIL_HOST:127.0.0.1}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Redis (shared across instances)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Cache — nearby alerts TTL (seconds)
nabat.cache.nearby-ttl=${NABAT_CACHE_NEARBY_TTL:15}

# Rate limiting removed — will be handled at the API-gateway layer.

# Nabat mail settings
nabat.mail.from=${MAIL_FROM:noreply@nabat.local}
# Base URL used in email links — override in production
nabat.mail.base-url=${NABAT_BASE_URL:http://localhost:8080}

# External voting service integration
nabat.voting.service.base-url=${NABAT_VOTING_SERVICE_BASE_URL:http://localhost:8081}
nabat.voting.service.auth-token=${NABAT_VOTING_SERVICE_AUTH_TOKEN:}
nabat.voting.service.connect-timeout=${NABAT_VOTING_SERVICE_CONNECT_TIMEOUT:PT2S}
nabat.voting.service.read-timeout=${NABAT_VOTING_SERVICE_READ_TIMEOUT:PT3S}
