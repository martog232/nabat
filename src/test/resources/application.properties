# Test-only overrides (no Spring profile required)
spring.application.name=nabat-test

# ── Database ──────────────────────────────────────────────────────────────────
# All tests that touch the database extend PostgresTestSupport, which injects
# the real PostgreSQL (postgis/postgis:16-3.4) Testcontainers URL at runtime via
# @DynamicPropertySource.  The placeholder below is intentionally pointing at a
# non-routable address so that any misconfigured test context fails fast instead
# of silently connecting to a developer's local database.
spring.datasource.url=jdbc:postgresql://localhost:0/nabat_test_no_container_configured
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=nabat
spring.datasource.password=nabat

# JPA / Hibernate — schema must come from Flyway; Hibernate only validates.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway — enabled by default; PostgresTestSupport also sets this via @DynamicPropertySource.
spring.flyway.enabled=true

# JWT
jwt.secret=test-jwt-secret-key-for-testing-only-min-256-bits-required-do-not-use-in-production
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Server / actuator
server.port=0
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false

# Logging
logging.level.org.example.nabat=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=WARN

# Mail — point at a non-existent server; tests mock EmailSender so no real connection is made
spring.mail.host=127.0.0.1
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
nabat.mail.from=noreply@nabat.test
nabat.mail.base-url=http://localhost
