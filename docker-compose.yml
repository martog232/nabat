services:
  postgres:
    image: postgres:16-alpine
    container_name: nabat-postgres
    environment:
      POSTGRES_DB: nabat_db
      POSTGRES_USER: nabat_user
      POSTGRES_PASSWORD: nabat_password
    ports:
      # Host port defaults to 5433 to avoid conflicts with a locally installed PostgreSQL on 5432.
      # Inside Docker, services still use postgres:5432.
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nabat_user -d nabat_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  nabat-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nabat-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nabat_db
      SPRING_DATASOURCE_USERNAME: nabat_user
      SPRING_DATASOURCE_PASSWORD: nabat_password
      # Local-development fallback only. Override with JWT_SECRET in your shell or .env.
      JWT_SECRET: ${JWT_SECRET:-nabat-local-docker-jwt-secret-key-min-256-bits-for-development-only-123456}
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local

